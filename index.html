<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Expense Capture</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#1a73e8" />

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Expenses" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />

  <meta name="color-scheme" content="light" />
  <meta name="format-detection" content="telephone=no" />

  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>

<div id="offline-banner" class="offline-banner" role="status">
  You're offline — receipt submission is unavailable until you reconnect.
</div>

<!-- ══════════════════════════════════════════════════════════════ -->
<!-- PAGE: Home                                                     -->
<!-- ══════════════════════════════════════════════════════════════ -->
<section id="page-home" class="page page--active" aria-label="Home">
  <div class="navbar">
    <span class="navbar__title">Expense Capture</span>
    <button id="btn-settings-home" class="icon-btn" aria-label="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>

  <div class="page-content">
    <div id="home-alert" class="alert-banner" hidden>
      Please <a id="home-alert-link" href="#">configure your webhook URL</a> in Settings first.
    </div>

    <div class="hero">
      <div class="hero__icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
      </div>
      <h1>Scan a Receipt</h1>
      <p>Use iOS Document Scanner for best results — tap Scan, then choose <strong>Scan Documents</strong>.</p>
    </div>

    <!-- Hidden file input — no capture attr so iOS shows the action sheet with "Scan Documents" -->
    <input type="file" id="file-input" accept="image/*" style="display:none" />

    <label for="file-input" id="btn-scan" class="btn btn--primary">Scan Receipt</label>
  </div>
</section>

<!-- ══════════════════════════════════════════════════════════════ -->
<!-- PAGE: Settings                                                 -->
<!-- ══════════════════════════════════════════════════════════════ -->
<section id="page-settings" class="page" aria-label="Settings">
  <div class="navbar">
    <button id="btn-back-settings" class="icon-btn" aria-label="Back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <span class="navbar__title">Settings</span>
    <div style="width:40px"></div>
  </div>

  <div class="page-content">
    <div class="form-group">
      <label for="input-webhook-url">n8n Webhook URL</label>
      <input type="url" id="input-webhook-url" placeholder="https://your-n8n.com/webhook/…"
             autocomplete="off" autocorrect="off" spellcheck="false" />
    </div>

    <div class="form-group">
      <label for="input-api-key">API Key</label>
      <div style="position:relative;">
        <input type="password" id="input-api-key" placeholder="Your API key"
               autocomplete="off" style="padding-right:48px;" />
        <button id="btn-toggle-key" type="button" aria-label="Show/hide API key"
          style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--grey-600);padding:4px;display:flex;">
          <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <div style="margin-top:24px;">
      <button id="btn-save-settings" class="btn btn--primary">Save Settings</button>
    </div>
  </div>
</section>

<!-- ══════════════════════════════════════════════════════════════ -->
<!-- PAGE: Result                                                   -->
<!-- ══════════════════════════════════════════════════════════════ -->
<section id="page-result" class="page" aria-label="Result">
  <div class="navbar">
    <span class="navbar__title">Result</span>
  </div>

  <div id="submit-spinner" class="spinner-overlay hidden" style="position:fixed;background:rgba(0,0,0,.6);">
    <div class="spinner"></div>
    <span>Submitting expense…</span>
  </div>

  <div class="page-content">
    <div class="result-hero">
      <div id="result-icon" class="result-icon"></div>
      <h2 id="result-title"></h2>
      <p id="result-message"></p>
    </div>

    <button id="btn-scan-another" class="btn btn--primary">Scan Another Receipt</button>
    <button id="btn-retry-submit" class="btn btn--secondary" hidden>Retry</button>
  </div>
</section>

<div id="toast" class="toast" role="status" aria-live="polite"></div>

<script type="module" src="/js/app.js"></script>
</body>
</html>
